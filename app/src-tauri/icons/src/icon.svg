  <!-- Bottom-right fold line -->
  <path d="M872 756 L638 556" stroke="#00C8D4" stroke-width="36" stroke-linecap="round" opacity="0.5"/>

  <!-- AI spark — 4-point gold star, top-right corner of envelope -->
