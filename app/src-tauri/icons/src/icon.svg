    <!-- Spark body -->
    <path d="
      M0,-52 C4,-20 20,-4 52,0
      C20,4 4,20 0,52
      C-4,20 -20,4 -52,0
      C-20,-4 -4,-20 0,-52 Z
    " fill="#FFC107"/>
