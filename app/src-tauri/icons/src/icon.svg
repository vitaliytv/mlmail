<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#0F1B2D"/>

  <!-- Envelope body -->
  <rect x="152" y="308" width="720" height="448" rx="48" fill="#FFFFFF" opacity="0.95"/>

  <!-- Envelope top fold (V-shape) — teal -->
  <path d="M152 356 L512 544 L872 356 L872 308 Q872 260 824 260 L200 260 Q152 260 152 308 Z" fill="#00C8D4"/>

  <!-- Bottom-left fold line -->
